name = "life-log-simple-20260706"
main = "./worker.js"
compatibility_date = "2026-07-08"

# Cloudflare Workers Static Assets. The build log error was asking for this block.
[assets]
directory = "."
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[kv_namespaces]]
binding = "VITALITY_SYNC"
id = "b34e2ead926e44b89b744af1fffdec132"

# The KV binding above lets the app retrieve and save synced journal history.
# If deploying only as a Pages project instead, the old functions/api/sync/[id].js file can still be used.